<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLXChat · вход</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        body {
            background: radial-gradient(circle at 30% 10%, #0b1f3a, #030814);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .auth-container {
            background: rgba(15,30,55,0.9);
            backdrop-filter: blur(10px);
            padding: 2.5rem;
            border-radius: 2rem;
            border: 1px solid #4f7ad0;
            max-width: 400px;
            width: 90%;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
        }
        .auth-container h1 {
            font-size: 3rem;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, #7aa9ff, #1f4a9e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .input-field {
            width: 100%;
            background: rgba(15,30,55,0.8);
            border: 1.5px solid #264d8c;
            border-radius: 3rem;
            padding: 0.9rem 1.4rem;
            margin: 0.6rem 0;
            color: white;
            font-size: 1rem;
            outline: none;
        }
        .input-field:focus {
            border-color: #5a8dee;
        }
        .btn {
            background: linear-gradient(145deg, #1d3f7a, #0e2b5a);
            border: 1px solid #4f7ad0;
            border-radius: 3rem;
            padding: 0.8rem 1.5rem;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            margin: 0.3rem;
            border: none;
        }
        .btn:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 25px #0e2f70;
        }
        .error-message {
            color: #ff8a8a;
            margin-top: 1rem;
        }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-compat.js"></script>
</head>
<body>
    <div class="auth-container">
        <h1>FLXChat</h1>
        <input type="email" id="email" class="input-field" placeholder="Email">
        <input type="password" id="password" class="input-field" placeholder="Пароль">
        <input type="text" id="nickname" class="input-field" placeholder="Никнейм (для регистрации)">
        <div>
            <button class="btn" id="loginBtn">Войти</button>
            <button class="btn" id="registerBtn">Регистрация</button>
        </div>
        <div id="authError" class="error-message"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAApLFtDT2C8PtR1swS2ksqVkhXm_9rJXg",
            authDomain: "test-37175.firebaseapp.com",
            projectId: "test-37175",
            storageBucket: "test-37175.firebasestorage.app",
            messagingSenderId: "881513229102",
            appId: "1:881513229102:web:a103fd48dff19a06b9a8bf"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        document.getElementById('registerBtn').addEventListener('click', async () => {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const nickname = document.getElementById('nickname').value.trim();
            const errorDiv = document.getElementById('authError');
            if (!email || !password || !nickname) {
                errorDiv.textContent = 'Заполните все поля';
                return;
            }
            try {
                const userCred = await auth.createUserWithEmailAndPassword(email, password);
                await db.collection('users').doc(userCred.user.uid).set({
                    email,
                    nickname,
                    role: 'user',
                    friends: [],
                    createdAt: new Date(),
                    lastActive: new Date(),
                    banned: false,
                    messageCount: 0,
                    bio: '',
                    avatarEmoji: '',
                    primeUntil: null,
                    balance: 0,
                    giftsReceived: [],
                    giftsSent: []
                });
                alert('Регистрация успешна! Теперь войдите.');
            } catch (error) {
                errorDiv.textContent = error.message;
            }
        });

        document.getElementById('loginBtn').addEventListener('click', async () => {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            try {
                await auth.signInWithEmailAndPassword(email, password);
                window.location.href = 'main.html';
            } catch (error) {
                document.getElementById('authError').textContent = error.message;
            }
        });

        auth.onAuthStateChanged(user => {
            if (user) {
                window.location.href = 'main.html';
            }
        });
    </script>
</body>
</html>
