<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>FLXChat · Маркет</title>
    <style>
        /* Базовые стили, аналогичные main.html */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        body {
            background: radial-gradient(circle at 30% 10%, #0b1f3a, #030814);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        #app {
            width: 100%;
            max-width: 1400px;
            height: 95vh;
            border-radius: 2.5rem;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            background: rgba(8, 20, 40, 0.7);
            backdrop-filter: blur(16px);
            display: flex;
            flex-direction: column;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.8rem 2rem;
            background: rgba(10, 25, 50, 0.6);
            border-bottom: 1px solid #2d4a84;
        }
        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #7aa9ff, #1f4a9e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            cursor: pointer;
        }
        .nav {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .nav-btn {
            background: rgba(30,60,120,0.6);
            border: 1px solid #416bc0;
            border-radius: 2rem;
            padding: 0.5rem 1.2rem;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 500;
            text-decoration: none;
            display: inline-block;
        }
        .nav-btn.active {
            background: #274e9e;
            border-color: #7aa5ff;
            box-shadow: 0 0 10px #3f6ec0;
        }
        .user-header-info {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            cursor: pointer;
        }
        .user-avatar-small {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: #1d3a70;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 1.2rem;
        }
        .user-name {
            color: white;
            font-weight: 600;
        }
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            gap: 2rem;
        }
        .market-container h1 {
            font-size: 3rem;
            background: linear-gradient(135deg, #7aa9ff, #1f4a9e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
        }
        .market-container p {
            font-size: 1.2rem;
            color: #b0d0ff;
            margin-bottom: 1rem;
        }
        .flx-balance {
            background: rgba(255,255,255,0.1);
            padding: 1rem 2rem;
            border-radius: 3rem;
            border: 1px solid #4f7ad0;
            display: inline-flex;
            align-items: center;
            gap: 1rem;
            font-size: 1.5rem;
            margin-top: 2rem;
        }
        .flx-balance span {
            font-weight: bold;
            color: #7aa9ff;
        }
        .footer {
            text-align: center;
            color: #6a7e9e;
            font-size: 0.75rem;
            padding: 0.5rem 0;
            margin-top: auto;
        }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-compat.js"></script>
</head>
<body>
    <div id="app">
        <div class="header">
            <div class="logo" onclick="goHome()">FLXChat</div>
            <div class="nav">
                <a href="main.html?screen=chat" class="nav-btn">Чат</a>
                <a href="main.html?screen=feed" class="nav-btn">Лента</a>
                <a href="main.html?screen=communities" class="nav-btn">Сообщества</a>
                <a href="market.html" class="nav-btn active">Маркет</a>
                <a href="main.html?screen=support" class="nav-btn">Поддержка</a>
                <a href="main.html?screen=admin" class="nav-btn" id="adminNavBtn" style="display:none;">Админ-панель</a>
            </div>
            <div class="user-header-info" onclick="openMyProfile()">
                <div id="headerAvatar" class="user-avatar-small"></div>
                <span id="headerName" class="user-name">Гость</span>
            </div>
        </div>

        <div class="main-content">
            <div class="market-container">
                <h1>🛒 Маркет FLXChat</h1>
                <p>Раздел находится в разработке. Скоро здесь можно будет обменивать FLXили на уникальные товары и привилегии.</p>
                <div class="flx-balance">
                    <span>💰 FLXили:</span> <span id="flxBalance">0</span>
                </div>
            </div>
        </div>

        <div class="footer">© 2026 FLXChat. Все права защищены.</div>
    </div>

    <div id="profileModal" class="modal" style="display:none;">
        <div class="modal-content">
            <span class="close" onclick="closeProfileModal()">&times;</span>
            <h2>Мой профиль</h2>
            <div id="profileContent"></div>
            <div style="margin:1rem 0;">
                <label>Ваш эмодзи-аватар (один символ):</label>
                <input type="text" id="avatarEmoji" class="input-field" maxlength="1" placeholder="😊">
            </div>
            <div style="margin:1rem 0;">
                <label>О себе:</label>
                <textarea id="profileBio" class="input-field" rows="3" placeholder="Расскажите о себе..."></textarea>
            </div>
            <div style="display:flex; gap:0.5rem;">
                <button class="btn" onclick="saveProfile()">Сохранить</button>
            </div>
        </div>
    </div>

    <style>
        /* Стили для модального окна (дублируем из main.html) */
        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: rgba(8,20,45,0.95);
            border: 1px solid #4f7ad0;
            border-radius: 2rem;
            padding: 2rem;
            max-width: 500px;
            width: 90%;
            color: white;
        }
        .modal-content h2 {
            color: white;
            margin-bottom: 1rem;
        }
        .close {
            float: right;
            font-size: 2rem;
            color: #aac2ff;
            cursor: pointer;
        }
        .input-field {
            width: 100%;
            background: rgba(15,30,55,0.8);
            border: 1.5px solid #264d8c;
            border-radius: 3rem;
            padding: 0.9rem 1.4rem;
            margin: 0.6rem 0;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
        }
        .input-field:focus {
            border-color: #5a8dee;
            box-shadow: 0 0 10px rgba(90,141,238,0.5);
        }
        .btn {
            background: linear-gradient(145deg, #1d3f7a, #0e2b5a);
            border: 1px solid #4f7ad0;
            border-radius: 3rem;
            padding: 0.8rem 1.5rem;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            margin: 0.3rem;
            border: none;
        }
        .btn:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 25px #0e2f70;
        }
    </style>

    <script>
        // Firebase конфигурация (такая же, как в main.html)
        const firebaseConfig = {
            apiKey: "AIzaSyAApLFtDT2C8PtR1swS2ksqVkhXm_9rJXg",
            authDomain: "test-37175.firebaseapp.com",
            projectId: "test-37175",
            storageBucket: "test-37175.firebasestorage.app",
            messagingSenderId: "881513229102",
            appId: "1:881513229102:web:a103fd48dff19a06b9a8bf"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const storage = firebase.storage();

        let currentUser = null;
        let currentUserData = null;

        // Вспомогательные функции
        function stringToColor(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = str.charCodeAt(i) + ((hash << 5) - hash);
            }
            const h = hash % 360;
            return `hsl(${h}, 70%, 50%)`;
        }

        function getAvatarHtml(nickname, uid, emoji) {
            if (emoji) return `<div style="width:100%; height:100%; border-radius:50%; background:${stringToColor(uid)}; display:flex; align-items:center; justify-content:center; color:white; font-weight:bold; font-size:1.2rem;">${emoji}</div>`;
            const letter = nickname ? nickname.charAt(0).toUpperCase() : '?';
            const bgColor = uid ? stringToColor(uid) : '#1d3a70';
            return `<div style="width:100%; height:100%; border-radius:50%; background:${bgColor}; display:flex; align-items:center; justify-content:center; color:white; font-weight:bold;">${letter}</div>`;
        }

        function updateUserAvatar() {
            if (!currentUser || !currentUserData) return;
            const avatarHtml = getAvatarHtml(currentUserData.nickname, currentUser.uid, currentUserData.avatarEmoji);
            document.getElementById('headerAvatar').innerHTML = avatarHtml;
        }

        function goHome() {
            window.location.href = 'main.html?screen=chat';
        }

        // Отслеживание аутентификации
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const userRef = db.collection('users').doc(user.uid);
                const userSnap = await userRef.get();
                if (!userSnap.exists) {
                    await userRef.set({
                        email: user.email || '',
                        nickname: 'User_' + user.uid.slice(-4),
                        role: 'user',
                        friends: [],
                        createdAt: new Date(),
                        lastActive: new Date(),
                        banned: false,
                        messageCount: 0,
                        bio: '',
                        avatarEmoji: '',
                        flx: 0 // Начальный баланс FLXили
                    });
                }
                currentUser = user;
                currentUserData = (await userRef.get()).data();
                document.getElementById('headerName').textContent = currentUserData.nickname;
                document.getElementById('flxBalance').textContent = currentUserData.flx || 0;
                updateUserAvatar();

                // Показываем кнопку админ-панели если нужно
                if (currentUserData.role === 'admin' || currentUserData.role === 'moderator') {
                    document.getElementById('adminNavBtn').style.display = 'inline-block';
                } else {
                    document.getElementById('adminNavBtn').style.display = 'none';
                }
            } else {
                window.location.href = 'login.html';
            }
        });

        // Профиль (аналогично main.html)
        function openMyProfile() {
            const content = document.getElementById('profileContent');
            content.innerHTML = `
                <div style="display:flex; flex-direction:column; align-items:center; gap:1rem;">
                    <div style="width:80px; height:80px; border-radius:50%; background:${stringToColor(currentUser.uid)}; display:flex; align-items:center; justify-content:center; font-size:2rem;">${currentUserData.avatarEmoji || currentUserData.nickname.charAt(0).toUpperCase()}</div>
                    <p><strong>Никнейм:</strong> ${escapeHtml(currentUserData.nickname)}</p>
                    <p><strong>FLXили:</strong> ${currentUserData.flx || 0}</p>
                    <p><strong>Email:</strong> ${escapeHtml(currentUserData.email)}</p>
                    <p><strong>Дата регистрации:</strong> ${currentUserData.createdAt ? new Date(currentUserData.createdAt.toDate()).toLocaleDateString() : 'неизвестно'}</p>
                </div>
            `;
            document.getElementById('avatarEmoji').value = currentUserData.avatarEmoji || '';
            document.getElementById('profileBio').value = currentUserData.bio || '';
            document.getElementById('profileModal').style.display = 'flex';
        }

        function closeProfileModal() {
            document.getElementById('profileModal').style.display = 'none';
        }

        function saveProfile() {
            const newEmoji = document.getElementById('avatarEmoji').value.trim();
            const newBio = document.getElementById('profileBio').value.trim();
            let updates = {};
            if (newEmoji) updates.avatarEmoji = newEmoji;
            updates.bio = newBio;
            db.collection('users').doc(currentUser.uid).update(updates);
            if (newEmoji) currentUserData.avatarEmoji = newEmoji;
            currentUserData.bio = newBio;
            updateUserAvatar();
            alert('Профиль обновлён');
            closeProfileModal();
        }

        function escapeHtml(unsafe) {
            if (!unsafe) return '';
            return unsafe.replace(/[&<>"]/g, m => {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                if (m === '"') return '&quot;';
            });
        }

        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                event.target.style.display = 'none';
            }
        };
    </script>
</body>
</html>
